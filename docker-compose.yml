# Local development database. Not for production - use any managed
# Postgres (Neon, Railway, RDS, …) via DATABASE_URL there.
services:
  db:
    image: postgres:16.6-alpine
    environment:
      POSTGRES_USER: malabarjs
      POSTGRES_PASSWORD: malabarjs # local-only placeholder credential
      POSTGRES_DB: malabarjs
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U malabarjs']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  db-data:
